[alembic]
script_location = alembic
# URL is overridden at runtime from VERDICTLENS_DATABASE_URL env var (see alembic/env.py)
# Set VERDICTLENS_DATABASE_URL in your .env — do not hardcode credentials here
sqlalchemy.url = postgresql://localhost/verdictlens

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
