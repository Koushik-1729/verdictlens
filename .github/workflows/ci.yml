name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK
        working-directory: sdk
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: sdk
        run: pytest tests/ -v

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  frontend-checks:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check & build
        working-directory: frontend
        run: npm run build
      - name: Run tests
        working-directory: frontend
        run: npm test

  sdk-benchmark:
    name: SDK Benchmark (p99 < 5ms gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK
        working-directory: sdk
        run: pip install -e .
      - name: Run benchmark
        run: python benchmarks/overhead_test.py

  publish-sdk:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    needs: [sdk-tests, backend-tests, sdk-benchmark]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine
      - name: Build package
        working-directory: sdk
        run: python -m build
      - name: Publish to PyPI
        working-directory: sdk
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
